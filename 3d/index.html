<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#000000">
  <meta name="color-scheme" content="dark">

  <title>Chaos Sphere Generator</title>
  <meta name="description" content="Generate, customize, and 3D-print chaos spheres — the volumetric Symbol of Chaos.">
  <meta name="application-name" content="Chaos Sphere Generator">

  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Chaos Sphere Generator">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="icon" type="image/png" href="../chaos-star-generator-files/assets/160x160.png">
  <link rel="apple-touch-icon" href="../chaos-star-generator-files/assets/160x160.png">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://caostar.com/3d/">
  <meta property="og:title" content="Chaos Sphere Generator">
  <meta property="og:description" content="Generate, customize, and 3D-print chaos spheres — the volumetric Symbol of Chaos.">

  <link rel="canonical" href="./">
  <link rel="stylesheet" href="css/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three":             "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/":     "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
      "three-mesh-bvh":    "https://cdn.jsdelivr.net/npm/three-mesh-bvh@0.7.8/build/index.module.js",
      "three-bvh-csg":     "https://cdn.jsdelivr.net/npm/three-bvh-csg@0.0.17/build/index.module.js",
      "fflate":            "https://cdn.jsdelivr.net/npm/fflate@0.8.2/esm/browser.js"
    }
  }
  </script>
</head>
<body>
  <canvas id="sphereCanvas"></canvas>

  <div id="controls-panel" class="cp-panel">
    <div class="cp-tab" id="cpTabHeader">
      <span class="cp-tab-icon">◉</span>
      <span class="cp-tab-label">Chaos Sphere Generator</span>
      <span class="cp-tab-status" id="cpStatus">●</span>
    </div>
    <div class="cp-body" id="cpBody">
      <div class="ctrl-tabs">
        <button class="ctrl-tab active" data-tab="shape">Shape</button>
        <button class="ctrl-tab" data-tab="material">Material</button>
        <button class="ctrl-tab" data-tab="shader">Shader</button>
        <button class="ctrl-tab" data-tab="lighting">Lighting</button>
        <button class="ctrl-tab" data-tab="actions">Actions</button>
      </div>

      <div class="ctrl-tab-content active" data-content="shape"    id="tabShape"></div>
      <div class="ctrl-tab-content"        data-content="material" id="tabMaterial"></div>
      <div class="ctrl-tab-content"        data-content="shader"   id="tabShader"></div>
      <div class="ctrl-tab-content"        data-content="lighting" id="tabLighting"></div>
      <div class="ctrl-tab-content"        data-content="actions"  id="tabActions">
        <button class="cp-btn cp-btn-start" id="reRandom">⟳ Inspire me randomly</button>
        <div class="cs-row">
          <div class="cs-label">Transition (ms)</div>
          <div class="cs-slider-wrap">
            <input type="range" id="speedSlider" class="cs-slider" min="100" max="3000" step="50" value="1700">
            <span class="cs-val" id="speedVal">1700</span>
          </div>
        </div>
        <div class="export-grid">
          <button class="cp-btn export-btn" data-fmt="stl">↓ STL</button>
          <button class="cp-btn export-btn" data-fmt="glb">↓ GLB</button>
          <button class="cp-btn export-btn" data-fmt="obj">↓ OBJ</button>
          <button class="cp-btn export-btn" data-fmt="3mf">↓ 3MF</button>
        </div>
        <button class="cp-btn" id="copyUrlBtn" style="width:100%; margin-top:8px;">⌘ Copy share URL</button>
        <button class="cp-btn hiddenOnMobile" id="goFullScreen" style="width:100%; margin-top:6px;">⛶ Full screen</button>
      </div>
    </div>
  </div>

  <a id="know-more-link"
     href="https://caostar.com/thoughts/the-chaos-star-generator-revamped/2026/05/"
     target="_blank"
     rel="noopener">Know more</a>

  <div id="toast"></div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
